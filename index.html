<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخريطة المباشرة | LiveNews21</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.css" />
<style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root{
        --red:#e3101f;
        --red2:#ff2d3d;
        --red-dark:#7a0a12;
        --black:#050505;
        --black2:#0e0e0e;
        --black3:#161616;
        --gray:#8f8f8f;
        --green:#22c55e;
    }

    html, body{ height:100%; }
    body{ font-family:'Segoe UI', Tahoma, Arial, sans-serif; background:#050505; color:#f5f5f5; overflow:hidden; }

    /* ===== fullscreen map ===== */
    #south-map{ position:fixed; inset:0; z-index:1; }

    /* ===== top bar (floating) ===== */
    .top-bar{
        position:fixed; top:0; left:0; right:0; z-index:500;
        display:flex; align-items:center; justify-content:space-between;
        padding:.7rem 1rem;
        background:linear-gradient(to bottom, rgba(5,5,5,0.9), rgba(5,5,5,0));
        pointer-events:none;
    }
    .top-bar > *{ pointer-events:auto; }

    .brand{ display:flex; align-items:center; gap:.6rem; text-decoration:none;
        background:rgba(10,10,10,0.85); backdrop-filter:blur(10px);
        border:1px solid rgba(227,16,31,0.3); border-radius:12px; padding:.45rem .9rem .45rem .5rem;
    }
    .brand img{ width:30px; height:30px; border-radius:7px; }
    .brand-name{ font-size:.95rem; font-weight:900; color:#fff; white-space:nowrap; }
    .brand-name .accent{ color:var(--red2); }

    .top-right{ display:flex; align-items:center; gap:.6rem; }

    .pill-btn{
        display:flex; align-items:center; gap:.45rem;
        background:rgba(10,10,10,0.85); backdrop-filter:blur(10px);
        border:1px solid rgba(255,255,255,0.12); border-radius:12px;
        padding:.55rem .95rem; font-size:.82rem; font-weight:700; color:#eee;
        text-decoration:none; cursor:pointer; white-space:nowrap;
        transition:.2s;
    }
    .pill-btn:hover{ border-color:rgba(227,16,31,0.5); }

    .live-badge{
        border-color:rgba(34,197,94,0.4);
    }
    .live-dot-green{
        width:8px; height:8px; border-radius:50%; background:var(--green);
        box-shadow:0 0 8px var(--green);
        animation:pulse 1.3s infinite;
    }
    @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:1;} 50%{ transform:scale(1.8); opacity:.35;} }

    .report-btn{
        background:linear-gradient(135deg,var(--red2),var(--red-dark));
        border-color:transparent; color:#fff;
    }

    /* ===== left floating tool stack ===== */
    .tool-stack{
        position:fixed; top:80px; left:14px; z-index:500;
        display:flex; flex-direction:column; gap:.6rem;
    }
    .tool-btn{
        width:44px; height:44px; border-radius:11px;
        background:rgba(10,10,10,0.85); backdrop-filter:blur(10px);
        border:1px solid rgba(255,255,255,0.12);
        display:flex; align-items:center; justify-content:center;
        font-size:1.1rem; color:#eee; cursor:pointer; transition:.2s;
    }
    .tool-btn:hover{ border-color:rgba(227,16,31,0.5); color:var(--red2); }
    .tool-btn.active{ background:linear-gradient(135deg,var(--red2),var(--red-dark)); border-color:transparent; color:#fff; }

    /* ===== bottom bar ===== */
    .bottom-bar{
        position:fixed; bottom:0; left:0; right:0; z-index:500;
        display:flex; align-items:center; justify-content:space-between; gap:.8rem;
        padding:.9rem 1rem; flex-wrap:wrap;
        background:linear-gradient(to top, rgba(5,5,5,0.92), rgba(5,5,5,0));
        pointer-events:none;
    }
    .bottom-bar > *{ pointer-events:auto; }

    .filter-btn{
        display:flex; align-items:center; gap:.5rem;
        background:rgba(10,10,10,0.9); backdrop-filter:blur(10px);
        border:1px solid rgba(255,255,255,0.12); border-radius:12px;
        padding:.75rem 1.2rem; font-weight:700; font-size:.86rem; color:#eee;
        cursor:pointer; transition:.2s;
    }
    .filter-btn:hover{ border-color:rgba(227,16,31,0.5); }

    .alerts-btn{
        display:flex; align-items:center; gap:.7rem;
        background:rgba(10,10,10,0.9); backdrop-filter:blur(10px);
        border:1px solid rgba(255,255,255,0.12); border-radius:12px;
        padding:.7rem 1.2rem; cursor:pointer; transition:.2s; flex:1; max-width:340px;
    }
    .alerts-btn:hover{ border-color:rgba(227,16,31,0.5); }
    .alerts-count{
        background:var(--red2); color:#fff; font-weight:900; font-size:.8rem;
        width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
        flex-shrink:0;
    }
    .alerts-label{ font-weight:700; font-size:.86rem; color:#eee; }
    .alerts-bar-accent{ width:3px; height:20px; background:var(--red2); border-radius:2px; margin-inline-start:auto; }

    /* ===== legend panel (toggle) ===== */
    .legend-panel{
        position:fixed; top:80px; left:70px; z-index:500;
        background:rgba(10,10,10,0.94); backdrop-filter:blur(12px);
        border:1px solid rgba(227,16,31,0.3); border-radius:14px;
        padding:1rem 1.1rem; width:220px;
        transform:translateX(-20px); opacity:0; pointer-events:none;
        transition:.25s;
    }
    .legend-panel.show{ transform:translateX(0); opacity:1; pointer-events:auto; }
    .legend-panel h4{ font-size:.85rem; font-weight:900; margin-bottom:.7rem; color:#fff; }
    .legend-item{ display:flex; align-items:center; gap:.55rem; font-size:.8rem; color:#ddd; margin-bottom:.55rem; }
    .legend-item:last-child{ margin-bottom:0; }
    .legend-dot{ width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; border:2px solid #fff; }

    /* ===== incidents drawer (bottom sheet) ===== */
    .drawer-overlay{
        position:fixed; inset:0; z-index:600; background:rgba(0,0,0,0.5);
        opacity:0; pointer-events:none; transition:.25s;
    }
    .drawer-overlay.show{ opacity:1; pointer-events:auto; }
    .drawer{
        position:fixed; bottom:0; left:0; right:0; z-index:601;
        background:var(--black2); border-top:1px solid rgba(227,16,31,0.35);
        border-radius:20px 20px 0 0;
        max-height:65vh; display:flex; flex-direction:column;
        transform:translateY(100%); transition:.3s ease;
        box-shadow:0 -20px 50px rgba(0,0,0,0.6);
    }
    .drawer.show{ transform:translateY(0); }
    .drawer-handle{ width:40px; height:4px; background:rgba(255,255,255,0.2); border-radius:3px; margin:.8rem auto .4rem; }
    .drawer-header{ display:flex; align-items:center; justify-content:space-between; padding:.6rem 1.3rem 1rem; border-bottom:1px solid rgba(255,255,255,0.08); }
    .drawer-header h3{ font-size:1.05rem; font-weight:900; }
    .drawer-close{ background:none; border:none; color:var(--gray); font-size:1.3rem; cursor:pointer; }
    .drawer-body{ overflow-y:auto; padding:.4rem 0; }

    .incident-item{ padding:.9rem 1.3rem; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:.2s; display:flex; align-items:flex-start; gap:.7rem; }
    .incident-item:hover{ background:rgba(227,16,31,0.08); }
    .incident-item:last-child{ border-bottom:none; }
    .incident-badge{ width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; border:2px solid #fff; margin-top:.1rem; }
    .incident-text{ flex:1; }
    .incident-place{ font-weight:800; font-size:.92rem; margin-bottom:.15rem; }
    .incident-desc{ color:#bbb; font-size:.8rem; margin-bottom:.2rem; }
    .incident-time{ color:var(--gray); font-size:.72rem; }

    /* ===== add-incident mode ===== */
    #south-map.add-mode{ cursor:crosshair; }
    .add-mode-banner{
        position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-10px);
        z-index:700; background:linear-gradient(135deg,var(--red2),var(--red-dark));
        color:#fff; font-weight:800; font-size:.85rem; padding:.6rem 1.1rem; border-radius:12px;
        box-shadow:0 8px 20px rgba(227,16,31,0.35);
        opacity:0; pointer-events:none; transition:.25s;
    }
    .add-mode-banner.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }

    /* ===== add-incident modal ===== */
    .modal-overlay{
        position:fixed; inset:0; z-index:800; background:rgba(0,0,0,0.6);
        display:flex; align-items:center; justify-content:center; padding:1rem;
        opacity:0; pointer-events:none; transition:.2s;
    }
    .modal-overlay.show{ opacity:1; pointer-events:auto; }
    .modal-box{
        background:var(--black2); border:1px solid rgba(227,16,31,0.35); border-radius:16px;
        width:100%; max-width:380px; padding:1.3rem; max-height:85vh; overflow-y:auto;
        transform:scale(.95); transition:.2s;
    }
    .modal-overlay.show .modal-box{ transform:scale(1); }
    .modal-box h3{ font-size:1.05rem; font-weight:900; margin-bottom:.2rem; color:#fff; }
    .modal-sub{ font-size:.78rem; color:var(--gray); margin-bottom:1rem; }
    .form-group{ margin-bottom:.9rem; }
    .form-group label{ display:block; font-size:.8rem; font-weight:700; color:#ddd; margin-bottom:.35rem; }
    .form-group select, .form-group input, .form-group textarea{
        width:100%; background:var(--black3); border:1px solid rgba(255,255,255,0.12); border-radius:9px;
        padding:.6rem .7rem; font-size:.85rem; color:#f2f2f2; font-family:inherit;
    }
    .form-group textarea{ resize:vertical; min-height:60px; }
    .form-group select:focus, .form-group input:focus, .form-group textarea:focus{ outline:none; border-color:var(--red2); }
    .coords-line{ font-size:.72rem; color:var(--gray); margin-bottom:1rem; }
    .modal-actions{ display:flex; gap:.6rem; }
    .modal-btn{ flex:1; padding:.7rem; border-radius:10px; font-weight:800; font-size:.85rem; cursor:pointer; border:none; text-align:center; }
    .modal-btn.primary{ background:linear-gradient(135deg,var(--red2),var(--red-dark)); color:#fff; }
    .modal-btn.secondary{ background:rgba(255,255,255,0.08); color:#ddd; }

    /* ===== leaflet overrides ===== */
    .leaflet-control-zoom{ display:none; } /* we use custom zoom */
    .leaflet-popup-content-wrapper{ background:#161616; color:#f2f2f2; border:1px solid rgba(227,16,31,0.4); border-radius:10px; }
    .leaflet-popup-tip{ background:#161616; }
    .pop-title{ font-weight:900; color:var(--red2); margin-bottom:.3rem; font-size:.9rem; }
    .pop-place{ font-weight:700; margin-bottom:.2rem; font-size:.85rem; }
    .pop-time{ color:var(--gray); font-size:.75rem; }

    .pulse-wrap2{ position:relative; width:36px; height:36px; }
    .pulse-ring2{
        position:absolute; inset:0; border-radius:50%;
        animation:pulseRing 2s ease-out infinite; opacity:.4;
    }
    .marker-core{
        position:absolute; inset:4px; border-radius:50%; border:2px solid #fff;
        display:flex; align-items:center; justify-content:center;
    }
    .marker-core svg{ width:14px; height:14px; }
    .marker-core svg.spin-icon{ animation:spinIcon 3.2s linear infinite; transform-origin:center; }
    @keyframes pulseRing{ 0%{ transform:scale(1); opacity:.4;} 100%{ transform:scale(2.5); opacity:0;} }
    @keyframes spinIcon{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }

    /* ===== طيار/مسيّرة تدور فعليًا على محيط دائرة الخطر نفسها ===== */
    .orbit-wrap{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
    .orbit-rotor{
        position:absolute; inset:0; transform-origin:50% 50%;
        animation-name:orbitSpin; animation-timing-function:linear; animation-iteration-count:infinite;
    }
    .orbit-plane{
        position:absolute; top:0; left:50%; width:22px; height:22px;
        transform:translate(-50%,-50%) rotate(90deg);
        border-radius:50%; border:2px solid #fff; display:flex; align-items:center; justify-content:center;
        box-shadow:0 0 8px rgba(0,0,0,.45);
    }
    .orbit-plane svg{ width:14px; height:14px; }
    @keyframes orbitSpin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }

    /* ===== دائرة نطاق الخطر الجغرافية (نصف قطرها بالأمتار الحقيقية،
         فبتكبر بصريًا وبتتضح تلقائيًا كل ما قرّبت/زوّمت) ===== */
    .danger-circle{ animation:dangerPulse 2.6s ease-in-out infinite; }
    @keyframes dangerPulse{ 0%,100%{ fill-opacity:.18; } 50%{ fill-opacity:.32; } }

    /* ===== custom zoom stack ===== */
    .zoom-stack{
        position:fixed; bottom:80px; left:14px; z-index:500;
        background:rgba(10,10,10,0.85); backdrop-filter:blur(10px);
        border:1px solid rgba(255,255,255,0.12); border-radius:11px; overflow:hidden;
    }
    .zoom-btn{
        width:44px; height:40px; display:flex; align-items:center; justify-content:center;
        font-size:1.2rem; font-weight:700; color:#eee; cursor:pointer; transition:.2s;
    }
    .zoom-btn:hover{ color:var(--red2); background:rgba(227,16,31,0.1); }
    .zoom-divider{ height:1px; background:rgba(255,255,255,0.1); }

    /* ===== admin delete btn in drawer ===== */
    .del-inc-btn{
        background:none; border:1px solid rgba(255,255,255,0.1); border-radius:8px;
        color:var(--gray); font-size:.8rem; cursor:pointer; padding:.25rem .5rem;
        margin-top:.25rem; transition:.2s; flex-shrink:0; align-self:flex-start;
    }
    .del-inc-btn:hover{ border-color:var(--red2); color:var(--red2); }
</style>
</head>
<body>

<!-- FULLSCREEN MAP -->
<div id="south-map"></div>

<!-- TOP BAR -->
<div class="top-bar">
    <a href="#" class="brand">
        <div class="brand-name">Live<span class="accent">News</span>21</div>
    </a>
    <div class="top-right">
        <a href="https://t.me/LebBreakingNews" target="_blank" class="pill-btn report-btn">⚠️ <span class="label-text">بلّغ عن حدث</span></a>
        <div class="pill-btn live-badge"><span class="live-dot-green"></span> <span class="label-text">مباشر</span></div>
    </div>
</div>

<!-- LEFT TOOL STACK -->
<div class="tool-stack">
    <div class="tool-btn" id="legendToggle" title="دليل الرموز">⚙️</div>
    <!-- زر الإضافة مخفي بالكامل للزوار العاديين — يظهر فقط للأدمين بعد التحقق -->
    <div class="tool-btn" id="addIncidentToggle" title="إضافة اعتداء يدويًا" style="display:none">➕</div>
    <!-- زر رسم المنطقة (Zone) — أدمين فقط -->
    <div class="tool-btn" id="drawZoneToggle" title="رسم منطقة (يدوي)" style="display:none">▱</div>
    <!-- زر رسم منطقة بالاعتماد على خط الحدود الرسمي (نقطة بداية + نهاية) — أدمين فقط -->
    <div class="tool-btn" id="borderDrawToggle" title="رسم بالحدود (بداية/نهاية)" style="display:none">🛣️</div>
    <!-- زر إظهار حدود المحافظات والأقضية (ADM1/ADM2) — للجميع -->
    <a href="index.html" class="tool-btn" title="الرئيسية" style="text-decoration:none;">🏠</a>
</div>

<!-- ADD MODE BANNER -->
<div class="add-mode-banner" id="addModeBanner">📍 دوس على المكان على الخريطة لتحدد موقع الاعتداء</div>

<!-- BORDER-TRACE DRAW MODE BANNER -->
<div class="add-mode-banner" id="borderModeBanner" style="display:flex; align-items:center; gap:.7rem;">
    <span id="borderModeBannerText">📍 دوس نقطة البداية على الحد</span>
    <button type="button" id="borderFinishBtn" style="display:none; background:#22c55e; color:#fff; border:none; border-radius:8px; padding:.35rem .8rem; font-weight:800; font-size:.75rem; cursor:pointer; white-space:nowrap;">✓ إنهاء الرسم</button>
    <button type="button" id="borderCancelBtn" style="background:rgba(255,255,255,0.15); color:#fff; border:none; border-radius:8px; padding:.35rem .8rem; font-weight:800; font-size:.75rem; cursor:pointer; white-space:nowrap;">✕ إلغاء</button>
</div>

<!-- ADD INCIDENT MODAL -->
<div class="modal-overlay" id="addModal">
    <div class="modal-box">
        <h3>إضافة اعتداء جديد</h3>
        <div class="modal-sub">عبّي البيانات وانشر النقطة على الخريطة</div>
        <div class="coords-line" id="coordsLine"></div>
        <form id="addForm">
            <div class="form-group">
                <label>نوع الحدث</label>
                <select id="incType" required></select>
            </div>
            <div class="form-group">
                <label>اسم المكان</label>
                <input type="text" id="incPlace" placeholder="مثال: بنت جبيل" required>
            </div>
            <div class="form-group">
                <label>الوقت</label>
                <input type="text" id="incTime" placeholder="مثال: اليوم 14:20">
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="incDesc" placeholder="تفاصيل مختصرة عن الحدث..."></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="modal-btn secondary" id="addCancelBtn">إلغاء</button>
                <button type="submit" class="modal-btn primary">نشر على الخريطة</button>
            </div>
        </form>
    </div>
</div>

<!-- ZONE NAME/COLOR MODAL (بعد الرسم) -->
<div class="modal-overlay" id="zoneModal">
    <div class="modal-box">
        <h3>تسمية المنطقة</h3>
        <div class="modal-sub" id="zoneAutoCorrectNote">تم تصحيح الخط تلقائيًا ليطابق الحدود الرسمية</div>
        <form id="zoneForm">
            <div class="form-group">
                <label>اسم المنطقة</label>
                <input type="text" id="zoneLabel" placeholder="مثال: منطقة عمليات" required>
            </div>
            <div class="form-group">
                <label>اللون</label>
                <select id="zoneColor">
                    <option value="#f0b429">🟡 أصفر/ذهبي</option>
                    <option value="#e3101f">🔴 أحمر</option>
                    <option value="#3b82f6">🔵 أزرق</option>
                    <option value="#22c55e">🟢 أخضر</option>
                    <option value="#8b5cf6">🟣 بنفسجي</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="modal-btn secondary" id="zoneCancelBtn">إلغاء</button>
                <button type="submit" class="modal-btn primary">حفظ المنطقة</button>
            </div>
        </form>
    </div>
</div>

<!-- LEGEND PANEL -->
<div class="legend-panel" id="legendPanel">
    <h4>دليل الرموز</h4>
    <div id="legendList"></div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
    <div class="filter-btn" id="filterBtn">☰ تصفية</div>
    <div class="alerts-btn" id="alertsBtn">
        <span class="alerts-count" id="alertsCount">0</span>
        <span class="alerts-label">آخر التنبيهات</span>
        <span class="alerts-bar-accent"></span>
    </div>
</div>

<!-- ZOOM STACK -->
<div class="zoom-stack">
    <div class="zoom-btn" id="zoomIn">+</div>
    <div class="zoom-divider"></div>
    <div class="zoom-btn" id="zoomOut">−</div>
</div>

<!-- INCIDENTS DRAWER -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
        <h3>آخر التنبيهات</h3>
        <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <div class="drawer-body" id="incidentList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<!-- ================================================================
     Firebase v9+ modular SDK (ES modules — no build step needed)
     ================================================================ -->
<script type="module">
import { db } from "./firebase-config.js";
import { initAdminAuth } from "./admin-auth.js";
import {
    collection,
    addDoc,
    deleteDoc,
    doc,
    onSnapshot,
    serverTimestamp,
    orderBy,
    query
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ===== categories (clean SVG icons instead of emoji) =====
const svgIcons = {
    target: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="white"/></svg>',

// نحسب نقطة على بعد مسافة معيّنة بالأمتار وباتجاه (bearing) معيّن من نقطة جغرافية
// (معادلة تقريبية كافية لأغراض الرسم البصري على الخريطة)
function destPoint(lat, lng, distanceMeters, bearingDeg) {
    const R = 6378137;
    const brng = bearingDeg * Math.PI / 180;
    const lat1 = lat * Math.PI / 180, lng1 = lng * Math.PI / 180;
    const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distanceMeters / R) + Math.cos(lat1) * Math.sin(distanceMeters / R) * Math.cos(brng));
    const lng2 = lng1 + Math.atan2(Math.sin(brng) * Math.sin(distanceMeters / R) * Math.cos(lat1), Math.cos(distanceMeters / R) - Math.sin(lat1) * Math.sin(lat2));
    return [lat2 * 180 / Math.PI, lng2 * 180 / Math.PI];
}

// نحسب نصف قطر الدائرة بالبكسل على الشاشة حسب مستوى الزوم الحالي
function circleRadiusInPixels(lat, lng, radiusMeters) {
    const center = map.latLngToLayerPoint([lat, lng]);
    const edge = map.latLngToLayerPoint(destPoint(lat, lng, radiusMeters, 0));
    return center.distanceTo(edge);
}

function buildOrbitIcon(cat, diameterPx) {
    return L.divIcon({
        className: '',
        html: `
            <div class="orbit-wrap" style="width:${diameterPx}px; height:${diameterPx}px;">
                <div class="orbit-rotor" style="animation-duration:${cat.orbitSpeed || 8}s;">
                    <div class="orbit-plane" style="background:${cat.color}">${cat.icon}</div>
                </div>
            </div>
        `,
        iconSize: [diameterPx, diameterPx],
        iconAnchor: [diameterPx / 2, diameterPx / 2]
    });
}

const orbitMarkers = {}; // idx -> {marker, lat, lng, radiusMeters, cat}

function refreshOrbitMarker(idx) {
    const o = orbitMarkers[idx];
    if (!o) return;
    const diameterPx = circleRadiusInPixels(o.lat, o.lng, o.radiusMeters) * 2;
    o.marker.setIcon(buildOrbitIcon(o.cat, diameterPx));
}

map.on('zoomend', () => {

function addMarkerForIncident(inc, idx) {
    const cat = categories[inc.type] || categories['explosion'];
    const icon = L.divIcon({
        className: '',

            <div class="pulse-wrap2">

                <div class="marker-core" style="background:${cat.color}">${cat.icon}</div>
            </div>
        `,

    // دائرة نطاق حقيقية (نصف قطرها بالأمتار على أرض الواقع) — تكبر بصريًا

    const circle = L.circle([inc.lat, inc.lng], {

    let orbitMarker = null;
    // للطيران/المسيّرة: أيقونة طيارة صغيرة تدور فعليًا على محيط دائرة الخطر نفسها
    if (cat.spin) {

        orbitMarker = L.marker([inc.lat, inc.lng], {

const firestoreMarkerKeys = {};  // firestoreId -> map key

function loadFirestoreIncidents() {
    const q = query(incidentsCol, orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
        // أزل العلامات القديمة من Firestore عن الخريطة والقائمة
        Object.entries(firestoreMarkerKeys).forEach(([fid, mapKey]) => {
            if (markerRefs[mapKey]) {
                map.removeLayer(markerRefs[mapKey].marker);
                map.removeLayer(markerRefs[mapKey].circle);
                if (markerRefs[mapKey].orbitMarker) map.removeLayer(markerRefs[mapKey].orbitMarker);
                delete markerRefs[mapKey];
                delete orbitMarkers[mapKey];
            }
        });
        // أزل عناصر Firestore من القائمة (بس اللي عندها data-firestore-id)
        listEl.querySelectorAll('[data-firestore-id]').forEach(el => el.remove());
        // امسح المرجع القديم
        Object.keys(firestoreMarkerKeys).forEach(k => delete firestoreMarkerKeys[k]);

        snapshot.forEach((docSnap) => {
            const inc = docSnap.data();
            const mapKey = 'fs_' + docSnap.id;
            firestoreMarkerKeys[docSnap.id] = mapKey;
            addMarkerForIncident(inc, mapKey);
            addListItemForIncident(inc, mapKey, docSnap.id);
        });

        // حدّث العداد
        alertsCountEl.textContent = incidents.length + snapshot.size;
    });
}

// ===== تحميل حدود لبنان الرسمية (ملف محلي ثابت — geoBoundaries ADM0) =====
// المصدر: geoBoundaries.org (CC-BY 4.0) — حفظنا نسخة محلية عشان:
//  1) ما نعتمد على API حي وقت التشغيل (سرعة + ما ينكسر لو النت أو CORS تعطّل)
//  2) نستخدم حدود الدولة كاملة (ADM0) بدل التقسيمات الداخلية (أقضية)، لأن
//     الهدف هو تصحيح الخط على *الحد الرسمي الخارجي* للبنان، مو الحدود الداخلية.
let lebanonBoundaryLines = null;
async function loadLebanonBoundaryLines() {
    if (lebanonBoundaryLines) return lebanonBoundaryLines;
    try {
        const geoRes = await fetch('./lebanon-border.geojson');
        const geoData = await geoRes.json();
        const rawLines = turf.featureCollection(
            geoData.features.flatMap(f => {
                try { return [turf.polygonToLine(f)]; } catch (e) { return []; }
            })
        );
        // نفلطح أي MultiLineString لخطوط بسيطة (LineString) — turf.lineSlice
        // (المستخدم لاحقًا بميزة "رسم بالحدود") ما بيشتغل إلا على LineString
        lebanonBoundaryLines = turf.flatten(rawLines);
    } catch (err) {
        console.warn('تعذر تحميل حدود لبنان المرجعية — راح نكتفي بالتنعيم فقط:', err);
        lebanonBoundaryLines = null;
    }
    return lebanonBoundaryLines;
}
// نبدأ التحميل بالخلفية من فتح الصفحة، عشان يكون جاهز وقت أول رسم
loadLebanonBoundaryLines();

const SNAP_THRESHOLD_KM = 0.35; // إذا الخط قريب أقل من ٣٥٠ متر من حد رسمي، يلزّق عليه

// ===== التصحيح التلقائي: تنعيم الخط + لزق (snap) على الحدود الرسمية إذا قريب =====
async function autoCorrectPolygon(latlngPoints) {
    let coords = latlngPoints.map(p => [p.lng, p.lat]);
    const first = coords[0], last = coords[coords.length - 1];
    if (first[0] !== last[0] || first[1] !== last[1]) coords.push(first);
    if (coords.length < 4) return latlngPoints.map(p => [p.lat, p.lng]); // شكل صغير جداً، ما نلمسه

    let poly;
    try {
        poly = turf.simplify(turf.polygon([coords]), { tolerance: 0.0006, highQuality: true });
    } catch (e) {
        return latlngPoints.map(p => [p.lat, p.lng]);
    }

    const lines = await loadLebanonBoundaryLines();
    let snapped = false;
    if (lines && lines.features.length) {
        const newCoords = poly.geometry.coordinates[0].map((pt) => {
            const point = turf.point(pt);
            let best = null, bestDist = Infinity;
            lines.features.forEach(line => {
                const np = turf.nearestPointOnLine(line, point, { units: 'kilometers' });
                if (np.properties.dist < bestDist) { bestDist = np.properties.dist; best = np; }
            });
            if (best && bestDist < SNAP_THRESHOLD_KM) { snapped = true; return best.geometry.coordinates; }
            return pt;
        });
        poly = turf.polygon([newCoords]);
    }

    zoneAutoCorrectNote.textContent = snapped
        ? 'تم تصحيح الخط تلقائيًا ليطابق الحدود الرسمية'
        : 'تم تنعيم الخط (ما لكيت حد رسمي قريب بما فيه الكفاية للّزق)';

    return poly.geometry.coordinates[0].map(([lng, lat]) => [lat, lng]);
}

// ===================================================================
// ===== رسم بالحدود: تحدّد نقطة بداية ونقطة نهاية بس، والأداة
//        بترسم القطعة المطابقة تمامًا لخط حدود لبنان الرسمي بينهم
//        (مو خط مستقيم وليس تقريب — نقاط الحد الحقيقية Vertex by Vertex).
//        بعدين تكمّل رسم باقي المنطقة يدويًا (نقاط داخلية) وتضغط "إنهاء".
// ===================================================================
const borderDrawToggle = document.getElementById('borderDrawToggle');
const borderModeBanner = document.getElementById('borderModeBanner');
const borderModeBannerText = document.getElementById('borderModeBannerText');
const borderFinishBtn = document.getElementById('borderFinishBtn');
const borderCancelBtn = document.getElementById('borderCancelBtn');

const BORDER_PICK_THRESHOLD_KM = 3; // حتى تنلزّق نقطة الكبس على الحد لازم تكون بأقل من ٣ كم منه

let borderDrawState = null; // null | {step:'start'} | {step:'end', startLatLng} | {step:'extend', tracedLatLngs, extraPoints}
let borderTempLayer = null; // L.layerGroup([outline, line]) — نفس ستايل الخط المزدوج (هالة بيضا + لون فوقها)
let borderStartMarker = null;
let borderEndMarker = null;

// يرسم/يحدّث خط المعاينة بتأثير "توهج" أصفر: هالة صفرا شفافة وأعرض تحت + خط أصفر كامل فوقها
function drawBorderPreview(latlngs) {
    if (borderTempLayer) map.removeLayer(borderTempLayer);
    const glow = L.polyline(latlngs, { color: '#f0b429', weight: 12, opacity: 0.35, lineJoin: 'round' });
    const line = L.polyline(latlngs, { color: '#f0b429', weight: 4, opacity: 1, lineJoin: 'round' });
    borderTempLayer = L.layerGroup([glow, line]).addTo(map);
}

function resetBorderDraw() {
    if (borderTempLayer) { map.removeLayer(borderTempLayer); borderTempLayer = null; }
    if (borderStartMarker) { map.removeLayer(borderStartMarker); borderStartMarker = null; }
    if (borderEndMarker) { map.removeLayer(borderEndMarker); borderEndMarker = null; }
    borderDrawState = null;
    borderModeBanner.classList.remove('show');
    borderFinishBtn.style.display = 'none';
    borderDrawToggle.classList.remove('active');
    mapEl.classList.remove('add-mode');
}

// نلاقي أقرب نقطة على خط الحدود الرسمي لنقطة الكبس (إذا كانت قريبة كفاية)
function snapToBorder(latlng, lines) {
    if (!lines || !lines.features.length) return latlng;
    const clickPt = turf.point([latlng.lng, latlng.lat]);
    let best = null, bestDist = Infinity;
    lines.features.forEach(line => {
        const np = turf.nearestPointOnLine(line, clickPt, { units: 'kilometers' });
        if (np.properties.dist < bestDist) { bestDist = np.properties.dist; best = np; }
    });
    if (best && bestDist < BORDER_PICK_THRESHOLD_KM) {
        return L.latLng(best.geometry.coordinates[1], best.geometry.coordinates[0]);
    }
    return latlng;
}

// نقتطع القطعة الحقيقية من خط الحدود الواصلة بين نقطة البداية والنهاية
function traceBorderSegment(startLatLng, endLatLng, lines) {
    if (!lines || !lines.features.length) return [startLatLng, endLatLng];
    const startPt = turf.point([startLatLng.lng, startLatLng.lat]);
    const endPt = turf.point([endLatLng.lng, endLatLng.lat]);
    let bestLine = null, bestScore = Infinity;
    lines.features.forEach(line => {
        const d1 = turf.nearestPointOnLine(line, startPt, { units: 'kilometers' }).properties.dist;
        const d2 = turf.nearestPointOnLine(line, endPt, { units: 'kilometers' }).properties.dist;
        const score = d1 + d2;
        if (score < bestScore) { bestScore = score; bestLine = line; }
    });
    if (!bestLine) return [startLatLng, endLatLng];
    try {
        const sliced = turf.lineSlice(startPt, endPt, bestLine);
        const coords = sliced.geometry.coordinates.map(([lng, lat]) => L.latLng(lat, lng));
        return coords.length >= 2 ? coords : [startLatLng, endLatLng];
    } catch (e) {
        return [startLatLng, endLatLng];
    }
}

borderDrawToggle.addEventListener('click', async () => {
    if (!isAdmin) return;
    if (borderDrawState) { resetBorderDraw(); return; } // ضغطة تانية = إلغاء
    if (typeof setAddMode === 'function') setAddMode(false); // ما نخلي وضع إضافة الحدث مفعّل بنفس الوقت
    map.pm.disableDraw('Polygon'); // ما نخلي وضعين رسم مفعّلين سوا
    drawZoneToggle.classList.remove('active');

    borderDrawState = { step: 'start' };
    borderDrawToggle.classList.add('active');
    mapEl.classList.add('add-mode');
    borderModeBannerText.textContent = '📍 دوس نقطة البداية على الحد';
    borderFinishBtn.style.display = 'none';
    borderModeBanner.classList.add('show');

    await loadLebanonBoundaryLines(); // تأكيد إنه محمّل قبل أول كبسة
});

borderCancelBtn.addEventListener('click', resetBorderDraw);

borderFinishBtn.addEventListener('click', async () => {
    if (!borderDrawState || borderDrawState.step !== 'extend') return;
    const fullLatLngs = [...borderDrawState.tracedLatLngs, ...borderDrawState.extraPoints];
    if (fullLatLngs.length < 3) {
        alert('لازم على الأقل نقطة وحدة إضافية غير نقطتي البداية والنهاية لتصير منطقة مغلقة.');
        return;
    }
    resetBorderDraw();
    zoneAutoCorrectNote.textContent = 'جاري التصحيح التلقائي...';
    zoneModal.classList.add('show');
    zoneForm.reset();
    pendingZoneCoords = await autoCorrectPolygon(fullLatLngs);
});

map.on('click', async (e) => {
    if (!borderDrawState || !isAdmin) return;
    const lines = await loadLebanonBoundaryLines();
    const snapped = snapToBorder(e.latlng, lines);

    if (borderDrawState.step === 'start') {
        borderDrawState.startLatLng = snapped;
        borderStartMarker = L.circleMarker(snapped, { radius: 7, color: '#fff', weight: 2, fillColor: '#f0b429', fillOpacity: 1 }).addTo(map);
        borderDrawState.step = 'end';
        borderModeBannerText.textContent = '📍 هلق دوس نقطة النهاية على الحد';

    } else if (borderDrawState.step === 'end') {
        borderDrawState.endLatLng = snapped;
        borderEndMarker = L.circleMarker(snapped, { radius: 7, color: '#fff', weight: 2, fillColor: '#f0b429', fillOpacity: 1 }).addTo(map);

        const traced = traceBorderSegment(borderDrawState.startLatLng, borderDrawState.endLatLng, lines);
        borderDrawState.tracedLatLngs = traced;
        borderDrawState.extraPoints = [];
        drawBorderPreview(traced);

        borderDrawState.step = 'extend';
        borderModeBannerText.textContent = '✏️ كمّل دوس نقاط لإغلاق المنطقة';
        borderFinishBtn.style.display = 'inline-block';

    } else if (borderDrawState.step === 'extend') {
        borderDrawState.extraPoints.push(snapped);
        const full = [...borderDrawState.tracedLatLngs, ...borderDrawState.extraPoints];
        drawBorderPreview(full);
    }
});

// ===== عند إنهاء الأدمين رسم البوليجون =====
map.on('pm:create', async (e) => {
    if (!isAdmin || e.shape !== 'Polygon') return;
    drawZoneToggle.classList.remove('active');

    const rawLatLngs = e.layer.getLatLngs()[0];
    map.removeLayer(e.layer); // نشيل المسودة، وبنرسم النسخة النهائية بعد الحفظ

    zoneAutoCorrectNote.textContent = 'جاري التصحيح التلقائي...';
    zoneModal.classList.add('show');
    zoneForm.reset();

    pendingZoneCoords = await autoCorrectPolygon(rawLatLngs);
});

function closeZoneModal() {
    zoneModal.classList.remove('show');
    pendingZoneCoords = null;
}
zoneCancelBtn.addEventListener('click', closeZoneModal);
zoneModal.addEventListener('click', (e) => { if (e.target === zoneModal) closeZoneModal(); });

zoneForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!pendingZoneCoords || !isAdmin) return;

    const newZone = {
        label: document.getElementById('zoneLabel').value.trim() || 'منطقة',
        color: document.getElementById('zoneColor').value,
        // Firestore ما بيدعم nested arrays (array of arrays)، فلازم نحوّل كل نقطة
        // من [lat,lng] لـ {lat,lng} قبل الحفظ
        coords: pendingZoneCoords.map(([lat, lng]) => ({ lat, lng })),
        createdAt: serverTimestamp()
    };

    try {
        await addDoc(zonesCol, newZone);
        closeZoneModal();
    } catch (err) {
        alert('فشل حفظ المنطقة: ' + err.message);
    }
});

// ===== رسم منطقة بنفس ستايل خط الحدود المزدوج (أبيض + ذهبي/ملون) =====
function renderZone(zone, key) {
    const color = zone.color || '#f0b429';
    const glow = L.polygon(zone.coords, { color, weight:12, opacity:0.35, fillOpacity:0, interactive:false }).addTo(map);
    const fill = L.polygon(zone.coords, { color, weight:4, opacity:1, fillColor:color, fillOpacity:0.15, lineJoin:'round' }).addTo(map);

    const popupHtml = `
        ${zone.label ? `<div class="pop-title">${zone.label}</div>` : ''}
        ${isAdmin ? `<button type="button" class="zone-delete-btn" data-zone-id="${key}"
            style="margin-top:.5rem; width:100%; padding:.45rem .7rem; border:none; border-radius:8px;
            background:var(--red2); color:#fff; font-weight:800; font-size:.8rem; cursor:pointer;">
            🗑️ حذف المنطقة</button>` : ''}
    `;
    if (zone.label || isAdmin) {
        fill.bindPopup(popupHtml);
        if (isAdmin) {
            fill.on('popupopen', () => {
                const btn = document.querySelector(`.zone-delete-btn[data-zone-id="${key}"]`);
                if (btn) {
                    btn.addEventListener('click', async () => {
                        if (!confirm('حذف هالمنطقة نهائيًا؟')) return;
                        try {
                            await deleteDoc(doc(db, 'zones', key));
                            map.closePopup();
                        } catch (err) {
                            alert('فشل حذف المنطقة: ' + err.message);
                        }
                    });
                }
            });
        }
    }
    zoneRefs[key] = [glow, fill];
}

function loadZones() {
    onSnapshot(query(zonesCol, orderBy('createdAt', 'desc')), (snapshot) => {
        Object.values(zoneRefs).forEach(layers => layers.forEach(l => map.removeLayer(l)));
        Object.keys(zoneRefs).forEach(k => delete zoneRefs[k]);
        snapshot.forEach((docSnap) => renderZone(docSnap.data(), docSnap.id));
    });
}
</script>
</body>
